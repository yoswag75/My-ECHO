name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  # These must be at the same indentation level as flutter_test
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

# Configuration for the icon generator
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon1.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon1.png"

flutter:
  uses-material-design: true
  # assets:
  #   - assets/